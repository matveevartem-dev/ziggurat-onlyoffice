name: ${COMPOSE_PROJECT_NAME:-ziggurat-os}

services:
  onlyoffice-documentserver:
    build:
      context: ${PWD}/layers/services/onlyoffice
      dockerfile: ${PWD}/layers/services/onlyoffice/Dockerfile
    container_name: ziggurat-onlyoffice-documentserver
    depends_on:
      - onlyoffice-postgresql
      - onlyoffice-rabbitmq
    environment:
      - APP_ENV=${APP_ENV}
      - DB_TYPE=postgres
      - DB_HOST=onlyoffice-postgresql
      - DB_PORT=5432
      - DB_NAME=onlyoffice
      - DB_USER=onlyoffice
      - AMQP_URI=amqp://guest:guest@onlyoffice-rabbitmq
      - ALLOW_META_IP_ADDRESS=true
      - ALLOW_PRIVATE_IP_ADDRESS=true
      - SITE_NAME=${SITE_NAME}
      - ONLYOFFICE_NAME=${ONLYOFFICE_NAME}
      - LOCAL_INTERFACE_IP=${LOCAL_INTERFACE_IP}
      - JWT_ENABLED=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 15s
      retries: 4
      start_period: 40s
      timeout: 5s
    stdin_open: true
    restart: always
    stop_grace_period: 60s
    ports:
      - ${ZOS_ONLYOFFICE_PORT}:80  
    volumes:
      - ../../volumes/shared-documents:/shared
      - ../../volumes/onlyoffice:/shared
      - ../../volumes/onlyoffice/cache:/var/lib/onlyoffice/documentserver/App_Data/cache/files
      - ../../volumes/onlyoffice/public:/var/www/onlyoffice/documentserver-example/public/files
      - /var/log/onlyoffice
      - /usr/share/fonts
    extra_hosts:
      - crm.legacy.lan:${ZOS_SDN_LEGACY_GATEWAY}
    networks:
      - ziggurat-net

  onlyoffice-rabbitmq:
    image: rabbitmq:3
    container_name: ziggurat-onlyoffice-rabbitmq
    restart: always
    expose:
      - '5672'
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "status"]
      interval: 10s
      retries: 3
      start_period: 10s
      timeout: 10s
    environment:
      - SSL_DHPARAM_PATH
    networks:
      - ziggurat-net

  onlyoffice-postgresql:
    image: postgres:15
    container_name: ziggurat-onlyoffice-postgresql
    environment:
      - POSTGRES_DB=onlyoffice
      - POSTGRES_USER=onlyoffice
      - POSTGRES_HOST_AUTH_METHOD=trust
    restart: always
    expose:
      - '5432'
    volumes:
      - postgresql_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onlyoffice"]
      interval: 10s
      retries: 3
      start_period: 10s
      timeout: 10s
    networks:
      - ziggurat-net

volumes:
  postgresql_data:

networks:
  ziggurat-net:
    name: ziggurat-net
