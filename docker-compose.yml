name: ${COMPOSE_PROJECT_NAME:-ziggurat-os}
services:
  onlyoffice-documentserver:
    build:
      context: ./
      dockerfile: ./Dockerfile
    #image: onlyoffice/documentserver #[-de,-ee]
    container_name: ziggurat-onlyoffice-documentserver
    depends_on:
      - onlyoffice-postgresql
      - onlyoffice-rabbitmq
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV}
      - DB_TYPE=postgres
      - DB_HOST=onlyoffice-postgresql
      - DB_PORT=5432
      - DB_NAME=onlyoffice
      - DB_USER=onlyoffice
      - AMQP_URI=amqp://guest:guest@onlyoffice-rabbitmq
      # Uncomment strings below to enable the JSON Web Token validation.
      - ALLOW_META_IP_ADDRESS=true
      - ALLOW_PRIVATE_IP_ADDRESS=true
      - SITE_NAME=${SITE_NAME}
      - ONLYOFFICE_NAME=${ONLYOFFICE_NAME}
      - LOCAL_INTERFACE_IP=${LOCAL_INTERFACE_IP}
      - JWT_ENABLED=false
      #- process.env.NODE_TLS_REJECT_UNAUTHORIZED=0
      #- NODE_TLS_REJECT_UNAUTHORIZED=0
      #- SSL_SELFSIGNED_CERTIFICATE=true
      #- USE_UNAUTHORIZED_STORAGE=true
      #- JWT_SECRET=secret
      #- JWT_HEADER=Authorization
      #- JWT_IN_BODY=true
      #- LETS_ENCRYPT_DOMAIN=${SITE_NAME} # If using Let's Encrypt
      #- LETS_ENCRYPT_MAIL=info@perevodpravo.ru # If using Let's Encrypt
      - SSL_CERTIFICATE_PATH=${SSL_CERTIFICATE_PATH}
      - SSL_CRT_PATH=${SSL_CRT_PATH}
      - SSL_KEY_PATH=${SSL_KEY_PATH}
      - SSL_DHPARAM_PATH=${SSL_DHPARAM_PATH}
    ports:
      - ${HTTP_PORT}:80
      - ${SSL_PORT}:443
    healthcheck:
      test: ["CMD", "curl", "-f", "http://document-service:8000/info/info.json"]
      interval: 30s
      retries: 5
      start_period: 60s
      timeout: 10s
    stdin_open: true
    restart: always
    stop_grace_period: 60s
    volumes:
      - ${OS_CERTIFICATE_PATH}:${SSL_CERTIFICATE_PATH}:ro
      - ${OS_CRT_PATH}:${SSL_CRT_PATH}:ro
      - ${OS_KEY_PATH}:${SSL_KEY_PATH}:ro
      - ${OS_DHPARAM_PATH}:${SSL_DHPARAM_PATH}:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ../../infrastructure/nginx/ssl:/etc/ssl:ro
      - ../../volumes/shared-documents:/shared # Сквозная шина данных
      - ../../volumes/onlyoffice:/shared # Сквозная шина данных
      - ../../volumes/onlyoffice/cache:/var/lib/onlyoffice/documentserver/App_Data/cache/files
      - ../../volumes/onlyoffice/public:/var/www/onlyoffice/documentserver-example/public/files
      - /var/log/onlyoffice
      - /usr/share/fonts
    networks:
      - ziggurat-net

  onlyoffice-rabbitmq:
    image: rabbitmq:3
    container_name: ziggurat-onlyoffice-rabbitmq
    env_file:
      - .env
    restart: always
    expose:
      - '5672'
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "status"]
      interval: 10s
      retries: 3
      start_period: 10s
      timeout: 10s
    environment:
      - SSL_DHPARAM_PATH
    networks:
      - ziggurat-net

  onlyoffice-postgresql:
    image: postgres:15
    container_name: ziggurat-onlyoffice-postgresql
    env_file:
      - .env
    environment:
      - SSL_DHPARAM_PATH
      - POSTGRES_DB=onlyoffice
      - POSTGRES_USER=onlyoffice
      - POSTGRES_HOST_AUTH_METHOD=trust
    restart: always
    expose:
      - '5432'
    volumes:
      - postgresql_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onlyoffice"]
      interval: 10s
      retries: 3
      start_period: 10s
      timeout: 10s
    networks:
      - ziggurat-net

volumes:
  postgresql_data:

networks:
  ziggurat-net:
    name: ziggurat-net
    driver: bridge
    external: true
