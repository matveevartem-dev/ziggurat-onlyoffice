server {
    listen 80;
    server_name onlyoffice.ziggurat.ae;
    return 301 https://${host}${request_uri};
}

server {
    listen 443 ssl;
    server_name onlyoffice.ziggurat.ae;

    # Абсолютные внутренние пути к триумфальному Wildcard-сертификату!
    ssl_certificate /etc/nginx/ssl/ziggurat.crt;
    ssl_certificate_key /etc/nginx/ssl/ziggurat.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 100M;

    location / {
        proxy_pass http://onlyoffice_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
